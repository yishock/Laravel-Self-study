<!--
  版型 A：套印／全印 — 單頁外框骨架
  CSS：../../assets/css/type-a-overlay.css（可選 paper-variables.css 做全頁置中）
-->
<div class="wrap">
    <div class="container">
        <table>
            <thead>
                <tr>
                    <td class="company-name" colspan="6">{{company_name}}</td>
                    <td class="table-name" colspan="8">{{doc_title}}</td>
                </tr>
            </thead>
            <tbody>
                <!-- 表頭欄位：依各單據自訂 -->
                <tr class="form-body">
                    <td colspan="4">{{field_1}}</td>
                    <td colspan="4">{{field_2}}</td>
                    <td colspan="6">{{field_3}}</td>
                </tr>
                <!-- REPEAT: detail rows（分頁見 OverlayFormPagination） -->
                <tr class="form-body">
                    <td colspan="14">{{detail_line}}</td>
                </tr>
                <!-- END REPEAT -->
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="14">{{footer_note}}</td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>
