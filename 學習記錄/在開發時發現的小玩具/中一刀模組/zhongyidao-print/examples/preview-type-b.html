<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>預覽 — 產品出貨單（版型 B）</title>
    <link rel="stylesheet" href="../assets/css/paper-variables.css" />
    <link rel="stylesheet" href="../assets/css/type-b-shipment.css" />
</head>
<body>
    <p class="print-notice" style="max-width:215.9mm;margin:8px auto;padding:8px;font-size:13px;">
        瀏覽器預覽用。列印請選紙張「中一刀」、100%、無邊界。按 Ctrl+P 測試。
    </p>
    <div class="sheet-page">
        <div class="sheet-body">
            <div class="hdr-top">
                <div class="hdr-titles">
                    <div class="hdr-company">範例有限公司</div>
                    <div class="hdr-doc-subtitle">產品出貨單</div>
                </div>
                <div class="hdr-banner-contact">
                    <span class="addr-line">地址：台北市範例路 1 號</span>
                    電話：02-12345678<br>
                    傳真：02-87654321
                </div>
            </div>
            <div class="form-main">
                <div class="mark-side">外銷　內銷</div>
                <div class="form-stack">
                    <table class="date-strip">
                        <colgroup>
                            <col class="xg-b" /><col class="xg-c" /><col class="xg-d" /><col class="xg-e" />
                            <col class="xg-f" /><col class="xg-g" /><col class="xg-h" /><col class="xg-i" />
                            <col class="xg-j" /><col class="xg-k" /><col class="xg-l" /><col class="xg-m" />
                        </colgroup>
                        <tr class="row-date">
                            <td class="label" colspan="2">填單日期：</td>
                            <td class="text-left" colspan="6">2026年6月2日</td>
                            <td colspan="1"></td>
                            <td class="text-center" colspan="1"><div class="hdr-shipper">發貨人</div></td>
                            <td colspan="2"></td>
                        </tr>
                    </table>
                    <table class="form-grid">
                        <colgroup>
                            <col class="xg-b" /><col class="xg-c" /><col class="xg-d" /><col class="xg-e" />
                            <col class="xg-f" /><col class="xg-g" /><col class="xg-h" /><col class="xg-i" />
                            <col class="xg-j" /><col class="xg-k" /><col class="xg-l" /><col class="xg-m" />
                        </colgroup>
                        <tr class="info-row">
                            <td class="label" colspan="1">客戶：</td>
                            <td class="text-left" colspan="3">範例客戶</td>
                            <td class="label" colspan="2">出貨日期</td>
                            <td class="text-center" colspan="2">6月5日</td>
                            <td class="label" colspan="2">出貨(PO)編號</td>
                            <td class="text-left" colspan="2">SO-20260602-001</td>
                        </tr>
                        <tr class="head-row">
                            <td colspan="1">項次</td>
                            <td colspan="2">批號</td>
                            <td colspan="5">產品名稱,規格/等級</td>
                            <td colspan="1">數量</td>
                            <td colspan="1">單位</td>
                            <td colspan="1">單價</td>
                            <td colspan="1">金額</td>
                        </tr>
                        <tr class="item-row">
                            <td class="text-center" colspan="1">1</td>
                            <td class="text-center" colspan="2">B001</td>
                            <td class="text-left item-product" colspan="5">範例產品 A，特級</td>
                            <td class="text-right" colspan="1">10</td>
                            <td class="text-center" colspan="1">箱</td>
                            <td class="text-right" colspan="1">100</td>
                            <td class="text-right" colspan="1">1,000</td>
                        </tr>
                        <tr class="item-row"><td colspan="12"></td></tr>
                        <tr class="item-row"><td colspan="12"></td></tr>
                        <tr class="item-row"><td colspan="12"></td></tr>
                        <tr class="item-row"><td colspan="12"></td></tr>
                        <tr class="item-row"><td colspan="12"></td></tr>
                        <tr class="item-row"><td colspan="12"></td></tr>
                        <tr class="item-row"><td colspan="12"></td></tr>
                        <tr class="foot-row">
                            <td class="label" colspan="3">業務</td>
                            <td class="text-left" colspan="5">王小明</td>
                            <td class="label text-center" colspan="3">合計</td>
                            <td class="text-right" colspan="1">1,000</td>
                        </tr>
                        <tr class="remark-row">
                            <td class="label" colspan="3">備註</td>
                            <td class="text-left" colspan="9">範例備註</td>
                        </tr>
                    </table>
                    <div class="sign-line">
                        <div class="sign-seg text-left">廠長：</div>
                        <div class="sign-seg text-left">倉管：</div>
                        <div class="sign-seg text-left">簽收：</div>
                    </div>
                </div>
                <div class="copy-side">第一聯：存根　第二聯：會計　第三聯：倉庫　第四聯：客戶</div>
            </div>
        </div>
    </div>
</body>
</html>
